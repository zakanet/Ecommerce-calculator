<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HasibPro — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:#070d1a;color:#e8f0fe;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.card{background:#0f1a2e;border:1px solid #1f3050;border-radius:20px;padding:28px 24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px;}
.logo img{width:50px;height:50px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,212,170,.4));}
.logo-name{font-size:22px;font-weight:900;background:linear-gradient(135deg,#00d4aa,#4e8ef7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.badge{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.15);border-radius:10px;padding:8px;text-align:center;font-size:12px;color:#8fa3c0;margin-bottom:18px;line-height:1.6;}
.badge strong{color:#00d4aa;}
.alert{padding:10px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:14px;display:none;}
.alert.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;display:flex;gap:6px;}
.alert.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#6ee7b7;display:flex;gap:6px;}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:5px;background:#121f36;border-radius:10px;padding:4px;margin-bottom:18px;}
.tab{padding:9px;border-radius:7px;border:none;background:transparent;color:#8fa3c0;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.tab.active{background:linear-gradient(135deg,#00d4aa,#4e8ef7);color:#000;}
.form{display:none;flex-direction:column;gap:12px;}
.form.active{display:flex;}
label{font-size:12px;font-weight:700;color:#8fa3c0;margin-bottom:4px;display:block;}
input{background:#121f36;border:1.5px solid #1f3050;border-radius:10px;padding:11px 13px;color:#e8f0fe;font-family:'Cairo',sans-serif;font-size:13px;width:100%;outline:none;transition:all .2s;}
input:focus{border-color:#00d4aa;box-shadow:0 0 0 3px rgba(0,212,170,.1);}
.pw{position:relative;}
.pw input{padding-left:38px;}
.pw-toggle{position:absolute;left:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:#4a6080;cursor:pointer;font-size:15px;}
.btn{background:linear-gradient(135deg,#00d4aa,#4e8ef7);color:#000;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;padding:13px;border-radius:10px;border:none;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 5px 18px rgba(0,212,170,.3);transition:all .2s;margin-top:4px;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.divider{display:flex;align-items:center;gap:8px;margin:4px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1a2940;}
.divider span{font-size:11px;color:#4a6080;font-weight:600;}
.btn-google{background:transparent;border:1.5px solid #1f3050;border-radius:10px;padding:11px;color:#8fa3c0;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.btn-google:hover{border-color:#4e8ef7;color:#e8f0fe;}
.forgot{text-align:center;font-size:11px;color:#4a6080;margin-top:4px;}
.forgot a{color:#00d4aa;text-decoration:none;font-weight:700;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:15px;height:15px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;}
</style>
</head>

  <!-- Login -->
  <form class="form" id="loginForm" onsubmit="doLogin(event)">
    <div><label>البريد الإلكتروني</label><input type="email" id="le" placeholder="exemple@gmail.com" autocomplete="email" required></div>
    <div><label>كلمة المرور</label><div class="pw"><input type="password" id="lp" placeholder="••••••••" autocomplete="current-password" required><button type="button" class="pw-toggle" onclick="togglePw('lp',this)">👁</button></div></div>
    <button type="submit" class="btn" id="loginBtn"><span>دخول</span></button>
    <div class="divider"><span>أو</span></div>
    <button type="button" class="btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      متابعة مع Google
    </button>
    <div class="forgot"><a href="#" onclick="doForgot(event)">نسيت كلمة المرور؟</a></div>
  </form>

  <!-- Register -->
  <form class="form active" id="registerForm" onsubmit="doRegister(event)">
    <div><label>الاسم الكامل</label><input type="text" id="rn" placeholder="اسمك الكامل" autocomplete="name" required></div>
    <div><label>البريد الإلكتروني</label><input type="email" id="re" placeholder="exemple@gmail.com" autocomplete="email" required></div>
    <div><label>كلمة المرور</label><div class="pw"><input type="password" id="rp" placeholder="8 أحرف على الأقل" minlength="8" autocomplete="new-password" required><button type="button" class="pw-toggle" onclick="togglePw('rp',this)">👁</button></div></div>
    <button type="submit" class="btn" id="registerBtn"><span>إنشاء حساب مجاني</span></button>
    <div class="divider"><span>أو</span></div>
    <button type="button" class="btn-google" onclick="doGoogle()">

</div>

<script>
const SUPABASE_URL = 'https://cpvgvfulkakghjhhrdsm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdmd2ZnVsa2FrZ2hqaGhyZHNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mzc0ODgsImV4cCI6MjA5MDMxMzQ4OH0.eExcqSG8slZ3l2jhBtRBTqFLtZ_FmAgXbo28mhKIC4s';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {detectSessionInUrl:true, persistSession:true, autoRefreshToken:true}
});

// If already logged in → go to app
sb.auth.getSession().then(({data:{session}}) => {
  if(session) window.location.href = '/app.html';
});

// Handle OAuth redirect
sb.auth.onAuthStateChange((event, session) => {
  if(event === 'SIGNED_IN' && session) {
    window.location.href = '/app.html';
  }
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
  });
  document.getElementById('loginForm').classList.toggle('active', tab==='login');
  document.getElementById('registerForm').classList.toggle('active', tab==='register');
  clearAlert();
}

function togglePw(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type==='password' ? 'text' : 'password';
  btn.textContent = el.type==='password' ? '👁' : '🙈';
}

function showAlert(msg, type='error') {
  const el = document.getElementById('alert');
  el.textContent = (type==='error'?'⚠️ ':'✅ ') + msg;
  el.className = 'alert ' + type;
}
function clearAlert() {
  document.getElementById('alert').className = 'alert';
}
function setLoading(id, on, label) {
  const btn = document.getElementById(id);
  btn.disabled = on;
  btn.innerHTML = on ? '<div class="spin"></div>' : '<span>' + label + '</span>';
}

async function doLogin(e) {
  e.preventDefault(); clearAlert();
  const email = document.getElementById('le').value.trim();
  const pass  = document.getElementById('lp').value;
  setLoading('loginBtn', true, 'دخول');
  const {error} = await sb.auth.signInWithPassword({email, password:pass});
  if(error) {
    const msg = error.message.includes('Invalid') ? 'البريد أو كلمة المرور خاطئة' :
                error.message.includes('confirmed') ? 'أكّد بريدك الإلكتروني أولاً' : error.message;
    showAlert(msg);
    setLoading('loginBtn', false, 'دخول');
  } else {
    showAlert('تم الدخول بنجاح...', 'success');
    setTimeout(() => window.location.href = '/app.html', 500);
  }
}

async function doRegister(e) {
  e.preventDefault(); clearAlert();
  const name  = document.getElementById('rn').value.trim();
  const email = document.getElementById('re').value.trim();
  const pass  = document.getElementById('rp').value;
  if(pass.length < 8) { showAlert('كلمة المرور يجب أن تكون 8 أحرف على الأقل'); return; }
  setLoading('registerBtn', true, 'إنشاء حساب مجاني');
  const {data, error} = await sb.auth.signUp({
    email, password: pass,
    options: {
      data: {full_name: name},
      emailRedirectTo: window.location.origin + '/app.html'
    }
  });
  if(error) {
    const msg = error.message.includes('already') ? 'هذا البريد مسجل مسبقاً — سجّل دخولك' : error.message;
    showAlert(msg);
    setLoading('registerBtn', false, 'إنشاء حساب مجاني');
  } else if(data.user && !data.session) {
    showAlert('تحقق من بريدك الإلكتروني لتأكيد حسابك', 'success');
    setLoading('registerBtn', false, 'إنشاء حساب مجاني');
  } else {
    showAlert('تم إنشاء الحساب بنجاح!', 'success');
    setTimeout(() => window.location.href = '/app.html', 500);
  }
}

async function doGoogle() {
  const {error} = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/app.html' }
  });
  if(error) showAlert('خطأ في Google — حاول مرة أخرى');
}

async function doForgot(e) {
  e.preventDefault();
  const email = document.getElementById('le').value.trim();
  if(!email) { showAlert('أدخل بريدك الإلكتروني في خانة تسجيل الدخول أولاً'); return; }
  const {error} = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/auth.html'
  });
  if(error) showAlert(error.message);
  else showAlert('تم إرسال رابط إعادة التعيين إلى بريدك ✅', 'success');
}
</script>
