<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HasibPro — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#070d1a;--card:#0f1a2e;--card2:#121f36;
  --border:#1a2940;--border2:#1f3050;
  --teal:#00d4aa;--blue:#4e8ef7;
  --text:#e8f0fe;--text2:#8fa3c0;--text3:#4a6080;
  --red:#ef4444;--green:#10b981;
  --grad:linear-gradient(135deg,#00d4aa,#4e8ef7);
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(0,212,170,.07),transparent 70%);top:-150px;right:-100px;animation:f1 12s ease-in-out infinite;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(78,142,247,.06),transparent 70%);bottom:-100px;left:-80px;animation:f2 15s ease-in-out infinite;}
@keyframes f1{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,30px)}}
@keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}}
.wrap{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:24px 20px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 24px 60px rgba(0,0,0,.5);margin:auto;}
/* Logo */
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;}
.logo-mark{width:52px;height:52px;filter:drop-shadow(0 4px 14px rgba(0,212,170,.4));flex-shrink:0;}
.logo-name{font-size:24px;font-weight:900;color:var(--text);}
/* Tabs */
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:var(--card2);border-radius:12px;padding:4px;margin-bottom:16px;}
.tab{padding:10px;border-radius:9px;border:none;background:transparent;color:var(--text2);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.tab.active{background:var(--grad);color:#000;box-shadow:0 4px 14px rgba(0,212,170,.25);}
/* Form */
.form{display:none;flex-direction:column;gap:10px;}
.form.active{display:flex;}
.field{display:flex;flex-direction:column;gap:6px;}
label{font-size:12px;font-weight:700;color:var(--text2);}
input{background:var(--card2);border:1.5px solid var(--border2);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;transition:all .2s;outline:none;}
input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,212,170,.1);}
input::placeholder{color:var(--text3);}
/* Password toggle */
.pass-wrap{position:relative;}
.pass-wrap input{width:100%;padding-left:40px;}
.pass-toggle{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0;transition:color .2s;}
.pass-toggle:hover{color:var(--teal);}
/* Submit btn */
.btn-submit{background:var(--grad);color:#000;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;padding:12px;border-radius:12px;border:none;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 6px 20px rgba(0,212,170,.3);transition:all .2s;margin-top:4px;}
.btn-submit:hover{opacity:.9;transform:translateY(-1px);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;}
/* Divider */
.divider{display:flex;align-items:center;gap:10px;margin:4px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:11px;color:var(--text3);font-weight:600;}
/* Google btn */
.btn-google{background:transparent;border:1.5px solid var(--border2);border-radius:12px;padding:10px;color:var(--text2);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.btn-google:hover{border-color:var(--blue);color:var(--text);}
/* Alert */
.alert{padding:11px 14px;border-radius:10px;font-size:12px;font-weight:600;display:none;align-items:center;gap:7px;}
.alert.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;display:flex;}
.alert.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#6ee7b7;display:flex;}
/* Forgot */
.forgot{text-align:center;font-size:11px;color:var(--text3);margin-top:6px;}
.forgot a{color:var(--teal);text-decoration:none;font-weight:700;}
.forgot a:hover{opacity:.8;}
/* Trial badge */
.trial-badge{background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.15);border-radius:10px;padding:8px 12px;text-align:center;font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:14px;}
.trial-badge strong{color:var(--teal);}
/* Loading spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrap">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-mark"><img src="/logo.png" alt="HasibPro" style="width:100%;height:100%;object-fit:contain;display:block;"></div>
    <div class="logo-name">HasibPro</div>
  </div>

  <!-- Trial Badge -->
  <div class="trial-badge">
    ✨ سجّل الآن واحصل على <strong>تجربة Pro مجانية 7 أيام</strong> — بلا بطاقة
  </div>

  <!-- Alert -->
  <div class="alert" id="alert"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">تسجيل الدخول</button>
    <button class="tab" onclick="switchTab('register')">حساب جديد</button>
  </div>

  <!-- Login Form -->
  <form class="form active" id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="loginEmail" placeholder="exemple@gmail.com" required autocomplete="email">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <div class="pass-wrap">
        <input type="password" id="loginPass" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="pass-toggle" onclick="togglePass('loginPass',this)">👁</button>
      </div>
    </div>
    <button type="submit" class="btn-submit" id="loginBtn">
      <span>دخول</span>
    </button>
    <div class="divider"><span>أو</span></div>
    <button type="button" class="btn-google" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      متابعة مع Google
    </button>
    <div class="forgot"><a href="#" onclick="handleForgot(event)">نسيت كلمة المرور؟</a></div>
  </form>

  <!-- Register Form -->
  <form class="form" id="registerForm" onsubmit="handleRegister(event)">
    <div class="field">
      <label>الاسم الكامل</label>
      <input type="text" id="regName" placeholder="اسمك الكامل" required autocomplete="name">
    </div>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="regEmail" placeholder="exemple@gmail.com" required autocomplete="email">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <div class="pass-wrap">
        <input type="password" id="regPass" placeholder="8 أحرف على الأقل" required minlength="8" autocomplete="new-password">
        <button type="button" class="pass-toggle" onclick="togglePass('regPass',this)">👁</button>
      </div>
    </div>
    <button type="submit" class="btn-submit" id="registerBtn">
      <span>إنشاء حساب مجاني</span>
    </button>
    <div class="divider"><span>أو</span></div>
    <button type="button" class="btn-google" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      متابعة مع Google
    </button>
  </form>
</div>

<script>
const SUPABASE_URL = 'https://cpvgvfulkakghjhhrdsm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdmd2ZnVsa2FrZ2hqaGhyZHNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mzc0ODgsImV4cCI6MjA5MDMxMzQ4OH0.eExcqSG8slZ3l2jhBtRBTqFLtZ_FmAgXbo28mhKIC4s';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    detectSessionInUrl: true,
    persistSession: true,
    autoRefreshToken: true,
    storageKey: 'hasibpro-auth'
  }
});

// ✅ إذا كان مسجل دخوله → روح للتطبيق مباشرةً
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = '/app.html';
});

// Tab switch
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
  });
  document.getElementById('loginForm').classList.toggle('active', tab==='login');
  document.getElementById('registerForm').classList.toggle('active', tab==='register');
  clearAlert();
}

// Show/hide password
function togglePass(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁'; }
}

// Alert
function showAlert(msg, type='error') {
  const el = document.getElementById('alert');
  el.textContent = (type==='error'?'⚠️ ':'✅ ') + msg;
  el.className = 'alert ' + type;
}
function clearAlert() {
  const el = document.getElementById('alert');
  el.className = 'alert';
}

// Set loading state
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';
  } else {
    btn.disabled = false;
    btn.innerHTML = btnId==='loginBtn' ? '<span>دخول</span>' : '<span>إنشاء حساب مجاني</span>';
  }
}

// ✅ Login
async function handleLogin(e) {
  e.preventDefault();
  clearAlert();
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) return showAlert('يرجى ملء جميع الحقول');
  setLoading('loginBtn', true);
  try {
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
      if (error.message.includes('Invalid login')) showAlert('البريد الإلكتروني أو كلمة المرور غير صحيحة');
      else if (error.message.includes('Email not confirmed')) showAlert('يرجى تأكيد بريدك الإلكتروني أولاً');
      else showAlert(error.message);
      setLoading('loginBtn', false);
    } else {
      showAlert('تم الدخول بنجاح! جاري التحويل...', 'success');
      setTimeout(() => window.location.href = '/app.html', 800);
    }
  } catch(err) {
    showAlert('خطأ في الاتصال — تحقق من الإنترنت');
    setLoading('loginBtn', false);
  }
}

// ✅ Register
async function handleRegister(e) {
  e.preventDefault();
  clearAlert();
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  if (!name || !email || !pass) return showAlert('يرجى ملء جميع الحقول');
  if (pass.length < 8) return showAlert('كلمة المرور يجب أن تكون 8 أحرف على الأقل');
  setLoading('registerBtn', true);
  try {
    const { data, error } = await sb.auth.signUp({
      email, password: pass,
      options: { data: { full_name: name }, emailRedirectTo: window.location.origin + '/app.html' }
    });
    if (error) {
      if (error.message.includes('already registered')) showAlert('هذا البريد الإلكتروني مسجل بالفعل — سجّل دخولك');
      else showAlert(error.message);
      setLoading('registerBtn', false);
    } else if (data.user && !data.session) {
      showAlert('تم إنشاء الحساب! تحقق من بريدك الإلكتروني وانقر على رابط التأكيد للدخول للتطبيق مباشرةً — صلاحية الرابط 24 ساعة', 'success');
      setLoading('registerBtn', false);
    } else {
      showAlert('تم إنشاء الحساب بنجاح! جاري التحويل...', 'success');
      setTimeout(() => window.location.href = '/app.html', 800);
    }
  } catch(err) {
    showAlert('خطأ في الاتصال — تحقق من الإنترنت');
    setLoading('registerBtn', false);
  }
}

// ✅ Google OAuth
async function handleGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/app.html' }
  });
  if (error) showAlert('خطأ في Google — حاول مرة أخرى');
}

// ✅ Forgot Password
async function handleForgot(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) return showAlert('أدخل بريدك الإلكتروني أولاً في خانة الدخول');
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/auth.html'
  });
  if (error) showAlert(error.message);
  else showAlert('تم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني ✅', 'success');
}

// Handle OAuth callback (Google redirect)
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    window.location.href = window.location.origin + '/app.html';
  }
});
</script>
</body>
</html>
