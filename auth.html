function toggleAuthMode(){
  document.body.classList.toggle('light');
  localStorage.setItem('authTheme', document.body.classList.contains('light') ? 'light' : 'dark');
}
// Apply saved theme on load
(function(){
  const t = localStorage.getItem('authTheme');
  if(t === 'light') document.body.classList.add('light');
})();

</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body.light{--bg:#f0f4f8;--bg2:#ffffff;--bg3:#e2e8f0;--card:#ffffff;--card2:#f8fafc;--border:#cbd5e1;--text:#1e293b;--text2:#475569;--text3:#94a3b8;}
:root{
  --bg:#060d1a;
  --card:#0d1829;
  --border:#1a2d47;
  --teal:#00d4aa;
  --teal2:#00b894;
  --blue:#3b82f6;
  --red:#ef4444;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#64748b;
}
body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:20px 16px 40px 16px;
  position:relative;
  overflow-y:auto;
  overflow-x:hidden;
}

/* خلفية متحركة */
.bg-orb{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.15;
  pointer-events:none;
  animation:float 8s ease-in-out infinite;
}
.bg-orb-1{width:400px;height:400px;background:var(--teal);top:-100px;right:-100px;animation-delay:0s;}
.bg-orb-2{width:300px;height:300px;background:var(--blue);bottom:-80px;left:-80px;animation-delay:3s;}
.bg-orb-3{width:200px;height:200px;background:var(--teal2);top:30%;left:50%;animation-delay:5s;}
@keyframes float{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-20px) scale(1.05);}}

/* Grid pattern */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:linear-gradient(rgba(0,212,170,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

.container{
  width:100%;
  max-width:460px;
  position:relative;
  z-index:1;
  margin:auto;
  padding-bottom:20px;
}

/* Logo */
.logo{
  text-align:center;
  margin-bottom:32px;
  animation:slideDown 0.6s ease both;
}
.logo-icon{
  width:72px;height:72px;
  border-radius:20px;
  background:linear-gradient(135deg,var(--teal),var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  margin:0 auto 16px;
  box-shadow:0 0 40px rgba(0,212,170,0.3);
}
.logo-title{font-size:24px;font-weight:900;color:var(--text);line-height:1.3;}
.logo-sub{font-size:12px;color:var(--text3);margin-top:4px;}

@keyframes slideDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}

/* Card */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px 20px;
  box-shadow:0 25px 60px rgba(0,0,0,0.5);
  animation:slideUp 0.6s ease 0.2s both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* Tabs */
.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  background:#060d1a;
  border-radius:12px;
  padding:5px;
  margin-bottom:28px;
}
.tab-btn{
  padding:10px;
  border-radius:9px;
  border:none;
  font-family:'Cairo',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:all 0.3s;
  color:var(--text3);
  background:transparent;
}
.tab-btn.active{
  background:linear-gradient(135deg,var(--teal),var(--teal2));
  color:#000;
  box-shadow:0 4px 15px rgba(0,212,170,0.3);
}

/* Form */
.form-group{margin-bottom:16px;}
.form-label{
  display:block;
  font-size:11px;
  font-weight:700;
  color:var(--text2);
  margin-bottom:7px;
}
.form-input{
  width:100%;
  background:#060d1a;
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:13px 16px;
  font-family:'Cairo',sans-serif;
  font-size:14px;
  color:var(--text);
  direction:rtl;
  transition:all 0.3s;
  outline:none;
}
.form-input:focus{
  border-color:var(--teal);
  box-shadow:0 0 0 3px rgba(0,212,170,0.1);
}
.form-input::placeholder{color:var(--text3);}

/* Submit button */
.btn-submit{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-family:'Cairo',sans-serif;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  background:linear-gradient(135deg,var(--teal),var(--teal2));
  color:#000;
  margin-top:8px;
  transition:all 0.3s;
  position:relative;
  overflow-y:auto;
  overflow-x:hidden;
}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,212,170,0.4);}
.btn-submit:active{transform:translateY(0);}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

/* Loading spinner */
.spinner{
  width:18px;height:18px;
  border:2px solid rgba(0,0,0,0.3);
  border-top-color:#000;
  border-radius:50%;
  display:inline-block;
  animation:spin 0.8s linear infinite;
  vertical-align:middle;
  margin-left:8px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Messages */
.msg{
  border-radius:10px;
  padding:12px 14px;
  font-size:12px;
  margin-bottom:16px;
  display:none;
  line-height:1.6;
}
.msg.show{display:block;}
.msg-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;}
.msg-success{background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);color:var(--teal);}

/* Divider */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0;
  color:var(--text3);font-size:11px;
}
.divider::before,.divider::after{
  content:'';flex:1;
  height:1px;background:var(--border);
}

/* Features */
.features{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:7px;
  margin-top:16px;
}
.feature{
  background:#060d1a;
  border:1px solid var(--border);
  border-radius:10px;
  padding:9px 10px;
  font-size:11px;
  color:var(--text2);
  display:flex;align-items:center;gap:7px;
  white-space:nowrap;
}
.feature-icon{font-size:15px;flex-shrink:0;}

/* Footer */
.footer{
  text-align:center;
  margin-top:24px;
  font-size:10px;
  color:var(--text3);
  animation:slideUp 0.6s ease 0.4s both;
}

/* Toast */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--card);
  border:1px solid var(--teal);
  border-radius:12px;
  padding:12px 24px;
  font-family:'Cairo',sans-serif;
  font-size:13px;
  font-weight:700;
  color:var(--teal);
  z-index:9999;
  opacity:0;
  transition:all 0.3s;
  pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Success screen */
.success-screen{
  display:none;
  text-align:center;
  padding:20px 0;
}
.success-icon{
  font-size:60px;
  margin-bottom:16px;
  animation:bounce 0.6s ease both;
}
@keyframes bounce{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
.success-title{font-size:20px;font-weight:900;color:var(--teal);margin-bottom:8px;}
.success-sub{font-size:12px;color:var(--text3);line-height:1.7;}
.btn-go{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:20px;
  padding:13px 28px;
  border-radius:12px;
  border:none;
  font-family:'Cairo',sans-serif;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  background:linear-gradient(135deg,var(--teal),var(--teal2));
  color:#000;
  transition:all 0.3s;
  text-decoration:none;
}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,212,170,0.4);}

/* Dark/Light mode toggle */
.mode-toggle{position:absolute;top:16px;left:16px;background:var(--card2);border:1px solid var(--border);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;z-index:10;}
.mode-toggle:hover{border-color:var(--teal);transform:scale(1.05);}
.mode-toggle svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:1.8;stroke-linecap:round;}
body.light .mode-toggle svg.moon{display:none;}
body.light .mode-toggle svg.sun{display:block;}
body:not(.light) .mode-toggle svg.moon{display:block;}
body:not(.light) .mode-toggle svg.sun{display:none;}

<script>
// ===== SUPABASE SETUP =====
const SUPABASE_URL = 'https://cpvgvfulkakghjhhrdsm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdmd2ZnVsa2FrZ2hqaGhyZHNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mzc0ODgsImV4cCI6MjA5MDMxMzQ4OH0.eExcqSG8slZ3l2jhBtRBTqFLtZ_FmAgXbo28mhKIC4s';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== CHECK IF ALREADY LOGGED IN =====
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    // المستخدم مسجل دخول — وجهه للـ dashboard
    window.location.href = 'index.html';
  }
});

// ===== SWITCH TABS =====
function switchTab(tab) {
  clearMessages();
  const isLogin = tab === 'login';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-signup').classList.toggle('active', !isLogin);
  document.getElementById('formLogin').style.display = isLogin ? 'block' : 'none';
  document.getElementById('formSignup').style.display = !isLogin ? 'block' : 'none';
  document.getElementById('successScreen').style.display = 'none';
}

// ===== CLEAR MESSAGES =====
function clearMessages() {
  document.getElementById('msgError').classList.remove('show');
  document.getElementById('msgSuccess').classList.remove('show');
}

// ===== SHOW ERROR =====
function showError(msg) {
  const el = document.getElementById('msgError');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('msgSuccess').classList.remove('show');
}

// ===== SHOW SUCCESS MSG =====
function showSuccess(msg) {
  const el = document.getElementById('msgSuccess');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('msgError').classList.remove('show');
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== SET LOADING =====
function setLoading(btnId, loading, text) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading
    ? `${text} <span class="spinner"></span>`
    : text;
}

// ===== LOGIN =====
async function doLogin() {
  clearMessages();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) {
    showError('⚠️ أدخل البريد الإلكتروني وكلمة المرور');
    return;
  }

  setLoading('btnLogin', true, '⏳ جاري الدخول...');

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  setLoading('btnLogin', false, '🚀 دخول للحاسبة');

  if (error) {
    if (error.message.includes('Invalid login')) {
      showError('❌ البريد الإلكتروني أو كلمة المرور غلط');
    } else if (error.message.includes('Email not confirmed')) {
      showError('📧 خاصك تأكد بريدك الإلكتروني أولاً — شوف صندوق الوارد');
    } else {
      showError('❌ ' + error.message);
    }
    return;
  }

  showToast('✅ مرحباً بك!');
  setTimeout(() => {
    window.location.href = 'index.html';
  }, 800);
}

// ===== SIGNUP =====
async function doSignup() {
  clearMessages();
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;

  if (!name || !email || !password) {
    showError('⚠️ أكمل جميع الحقول');
    return;
  }

  if (password.length < 8) {
    showError('⚠️ كلمة المرور خاصها 8 أحرف على الأقل');
    return;
  }

  if (!email.includes('@')) {
    showError('⚠️ البريد الإلكتروني غير صحيح');
    return;
  }

  setLoading('btnSignup', true, '⏳ جاري إنشاء الحساب...');

  const { data, error } = await sb.auth.signUp({
    email,
    password,
    options: {
      data: { full_name: name }
    }
  });

  setLoading('btnSignup', false, '✨ إنشاء حساب مجاني');

  if (error) {
    if (error.message.includes('already registered')) {
      showError('⚠️ هاد البريد الإلكتروني مسجل بالفعل — ادخل من تبويب "دخول"');
    } else {
      showError('❌ ' + error.message);
    }
    return;
  }

  // Show success screen
  document.getElementById('formSignup').style.display = 'none';
  document.getElementById('successScreen').style.display = 'block';
  document.getElementById('msgError').classList.remove('show');
}

function toggleAuthMode(){
  document.body.classList.toggle('light');
  localStorage.setItem('authTheme', document.body.classList.contains('light') ? 'light' : 'dark');
}
// Apply saved theme on load
(function(){
  const t = localStorage.getItem('authTheme');
  if(t === 'light') document.body.classList.add('light');
})();

</script>
